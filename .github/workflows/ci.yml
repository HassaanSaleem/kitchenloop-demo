name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Lint
        run: node scripts/lint.mjs
      - name: Unit tests
        run: node --test tests/*.test.mjs
      - name: L3 smoke journey
        run: node tests/smoke.mjs
